<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frames by Jim</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

header{
    position:relative;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
url("images/main header.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

.hero{
    animation:fadeUp 1.5s ease;
}

.hero h1{
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:3px;
    font-weight:700;
}

.hero p{
    margin-top:20px;
    font-size:1.2rem;
    color:#ddd;
}

.btn{
    display:inline-block;
    margin-top:40px;
    padding:16px 42px;
    border:2px solid white;
    color:white;
    text-decoration:none;
    border-radius:40px;
    transition:.35s;
}

.btn:hover{
    background:white;
    color:black;
}

.scroll{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:.9rem;
    opacity:.7;
    animation:bounce 2s infinite;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

@keyframes bounce{

    0%,20%,50%,80%,100%{
        transform:translate(-50%,0);
    }

    40%{
        transform:translate(-50%,-10px);
    }

    60%{
        transform:translate(-50%,-5px);
    }

}/* Navigation */

#navbar{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    padding:22px 8%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    transition:.4s;

    z-index:999;

}

#navbar.scrolled{

    background:rgba(10,10,10,.92);

    backdrop-filter:blur(10px);

    box-shadow:0 5px 20px rgba(0,0,0,.25);

}

.logo{

    font-size:1.5rem;

    font-weight:bold;

    letter-spacing:1px;

}

#navbar ul{

    display:flex;

    list-style:none;

    gap:35px;

}

#navbar a{

    color:white;

    text-decoration:none;

    font-size:15px;

    transition:.3s;

    position:relative;

}

#navbar a::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-6px;

    width:0;

    height:2px;

    background:white;

    transition:.3s;

}

#navbar a:hover::after{

    width:100%;

}
    </style>

</head>
<body>
<nav id="navbar">

    <div class="logo">
        Frames by Jim
    </div>

    <ul>

        <li><a href="#home">Home</a></li>

        <li><a href="#gallery">Portfolio</a></li>

        <li><a href="#about">About</a></li>

        <li><a href="#contact">Contact</a></li>

    </ul>

</nav>
<header id="home">

    <div class="hero">

        <h1>Frames by Jim</h1>

        <p>Capturing stories through light.</p>

        <a href="#gallery" class="btn">
            Explore Portfolio
        </a>

    </div>

    <div class="scroll">
        ↓ Scroll to discover ↓
    </div>

</header>
<section id="gallery">

    <h2>Featured Photos</h2>

    <div class="gallery">

        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80" alt="Photo 1">

        <img src="https://images.unsplash.com/photo-1516035069371-33534b4b7e36?auto=format&fit=crop&w=800&q=80" alt="Photo 2">

        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt="Photo 3">

        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80" alt="Photo 4">

    </div>

</section>

<footer>

    © 2026 Frames by Jim

</footer>
<script>

const navbar = document.getElementById("navbar");

window.addEventListener("scroll", () => {

    if(window.scrollY > 50){

        navbar.classList.add("scrolled");

    }else{

        navbar.classList.remove("scrolled");

    }

});

</script>
</body>
</html>
